<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Employee Alert Portal</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<main class="shell portal-shell">
    <header class="topbar">
        <div>
            <p class="eyebrow">Employee Alert Management</p>
            <h1>Choose Interface</h1>
        </div>
    </header>

    <section class="role-grid" aria-label="Role selection">
        <a class="role-card" href="/employee-login.html">
            <span class="role-icon">E</span>
            <strong>Employee</strong>
            <p>View your birthday and work anniversary events.</p>
        </a>
        <a class="role-card" href="/manager-login.html">
            <span class="role-icon">M</span>
            <strong>Manager</strong>
            <p>Review events for employees mapped to your Approver ID.</p>
        </a>
        <a class="role-card" href="/hr-login.html">
            <span class="role-icon">H</span>
            <strong>HR</strong>
            <p>Monitor HR-owned employee events and send emails.</p>
        </a>
    </section>
</main>
</body>
</html>
