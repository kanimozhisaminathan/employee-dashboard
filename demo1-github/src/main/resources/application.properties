spring.application.name=demo1
server.port=8081
spring.datasource.url=jdbc:h2:mem:employee-alerts;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true

# Set this to the employer/source-system endpoint that returns the CSV payload.
employee.source.url=

# Demo recipient address used by seeded employees.
app.demo.employee-email=${DEMO_EMPLOYEE_EMAIL:mohanapriya.saravanan2007@gmail.com}

# Email settings. Configure Gmail app password through environment variables.
app.mail.from=${MAIL_FROM:mohanapriya.saravanan2007@gmail.com}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:mohanapriya.saravanan2007@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
